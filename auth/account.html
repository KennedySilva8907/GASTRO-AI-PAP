<!doctype html>
<html lang="pt">
  <head>
    <link rel="icon" type="image/svg+xml" href="/frigideira.svg" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A tua conta GastroAI — plano, uso e configurações." />
    <title>Conta — GastroAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.3/dist/umd/supabase.min.js"
      integrity="sha384-iWpUQPQzWsFiosLgsS8o+e6E8y3Gm+EW2m/vAAo7A2H3fuc4KOKEx+5CAord2H2z"
      crossorigin="anonymous"></script>
  </head>
  <body class="auth-body">
    <a href="/" class="back-button" data-auth-link aria-label="Voltar ao início">
      <span class="back-button-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="none" d="M0 0h24v24H0z" />
          <path d="M19 13H5.83l5.59 5.59L10 20l-8-8 8-8 1.41 1.41L5.83 11H19v2z" />
        </svg>
      </span>
      <span class="back-button-text">Início</span>
    </a>

    <main class="auth-stage">
      <section class="account-card">
        <header class="account-header">
          <div class="account-avatar" id="avatar" aria-hidden="true">·</div>
          <div class="account-identity">
            <h1 class="account-name" id="user-name">A carregar…</h1>
            <p class="account-email" id="user-email">
              <span class="account-skeleton" style="width: 12rem; display: inline-block"
                >&nbsp;</span
              >
            </p>
          </div>
          <span class="account-plan-badge account-plan-badge--free" id="plan-badge">Free</span>
        </header>

        <section class="account-section">
          <h2 class="account-section__title">Uso nas últimas 24h</h2>
          <div class="account-usage" id="usage-list">
            <div class="account-usage__row">
              <div class="account-usage__head">
                <span class="account-usage__label">Mensagens de chat</span>
                <span class="account-usage__count" id="chat-count">— / —</span>
              </div>
              <div class="account-usage__bar">
                <div class="account-usage__fill" id="chat-fill" style="width: 0%"></div>
              </div>
            </div>
            <div class="account-usage__row">
              <div class="account-usage__head">
                <span class="account-usage__label">Receitas IA (desafios)</span>
                <span class="account-usage__count" id="challenge-count">— / —</span>
              </div>
              <div class="account-usage__bar">
                <div class="account-usage__fill" id="challenge-fill" style="width: 0%"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="account-section">
          <h2 class="account-section__title">Subscrição</h2>
          <div class="account-actions">
            <button
              type="button"
              class="account-action account-action--primary"
              id="upgrade-btn"
              hidden
            >
              <span>Fazer upgrade para Pro</span>
              <span class="account-action__chevron" aria-hidden="true">→</span>
            </button>
            <button type="button" class="account-action" id="portal-btn" hidden>
              <span>Gerir subscrição</span>
              <span class="account-action__chevron" aria-hidden="true">→</span>
            </button>
          </div>
        </section>

        <section class="account-section">
          <h2 class="account-section__title">Conta</h2>
          <div class="account-actions">
            <a href="/auth/forgot-password" class="account-action" data-auth-link>
              <span>Mudar senha</span>
              <span class="account-action__chevron" aria-hidden="true">→</span>
            </a>
            <button type="button" class="account-action account-action--danger" id="logout-btn">
              <span>Terminar sessão</span>
              <span class="account-action__chevron" aria-hidden="true">→</span>
            </button>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="/src/auth/transitions.js"></script>
    <script type="module" src="/src/auth/account.js"></script>
  </body>
</html>
