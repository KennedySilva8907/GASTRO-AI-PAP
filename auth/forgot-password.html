<!DOCTYPE html>
<html lang="pt">
<head>
  <link rel="icon" type="image/svg+xml" href="/frigideira.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Recupera a tua senha do GastroAI.">
  <title>Esqueceu a senha — GastroAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="auth-body">

  <a href="/auth/login" class="auth-back" aria-label="Voltar ao login">
    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
      <path fill="currentColor" d="M19 13H5.83l5.59 5.59L10 20l-8-8 8-8 1.41 1.41L5.83 11H19v2z"/>
    </svg>
    <span>Login</span>
  </a>

  <main class="auth-stage">
    <div class="auth-card">

      <div class="auth-brand">
        <svg class="auth-pan" viewBox="0 0 128 128" width="38" height="38" role="img" aria-label="GastroAI">
          <clipPath id="fp-clip"><rect rx="12" ry="14" x="4" y="52" width="68" height="28"/></clipPath>
          <g fill="#ff9800">
            <g class="pl__pan">
              <rect rx="2" ry="2" x="4" y="66" width="68" height="14" clip-path="url(#fp-clip)"/>
              <rect rx="2" ry="2" x="76" y="66" width="48" height="7"/>
            </g>
          </g>
        </svg>
        <span class="auth-brand__name">GastroAI</span>
      </div>

      <h1 class="auth-title">Esqueceste a senha?</h1>
      <p class="auth-subtitle">Indica o email da conta. Vais receber um link para definir uma nova senha.</p>

      <form class="auth-form" id="forgot-form" novalidate>
        <label class="auth-field">
          <span class="auth-field__label">Email</span>
          <input type="email" name="email" id="email" autocomplete="email" required placeholder="chef@exemplo.com">
        </label>

        <button type="submit" class="auth-submit" id="submit-btn">Enviar link de recuperação</button>

        <p class="auth-feedback" id="feedback" role="status" hidden></p>
      </form>

      <p class="auth-foot">
        Lembraste-te? <a href="/auth/login">Entrar</a>
      </p>

    </div>
  </main>

  <script type="module" src="/src/auth/forgot-password.js"></script>
</body>
</html>
