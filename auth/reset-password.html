<!doctype html>
<html lang="pt">
  <head>
    <link rel="icon" type="image/svg+xml" href="/frigideira.svg" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Define uma nova senha do GastroAI." />
    <title>Nova senha — GastroAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.3/dist/umd/supabase.min.js"
      integrity="sha384-iWpUQPQzWsFiosLgsS8o+e6E8y3Gm+EW2m/vAAo7A2H3fuc4KOKEx+5CAord2H2z"
      crossorigin="anonymous"></script>
  </head>
  <body class="auth-body">
    <main class="auth-stage">
      <div class="auth-card">
        <div class="auth-brand">
          <span class="auth-brand__name">GastroAI Atelier</span>
          <svg class="auth-pan" viewBox="0 0 128 128" role="img" aria-label="GastroAI">
            <clipPath id="pan-clip-reset">
              <rect rx="12" ry="14" x="4" y="52" width="68" height="28" />
            </clipPath>
            <defs>
              <linearGradient id="pl-grad-reset" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#000" />
                <stop offset="100%" stop-color="#fff" />
              </linearGradient>
              <mask id="pl-mask-reset">
                <rect x="0" y="0" width="88" height="80" fill="url(#pl-grad-reset)" />
              </mask>
            </defs>
            <g fill="currentColor">
              <g
                fill="none"
                stroke-dasharray="20 221"
                stroke-dashoffset="20"
                stroke-linecap="round"
                stroke-width="4"
              >
                <g stroke="hsl(38,90%,50%)">
                  <circle class="pl__ring" cx="44" cy="40" r="35" transform="rotate(90,44,40)" />
                </g>
                <g stroke="hsl(8,90%,40%)" mask="url(#pl-mask-reset)">
                  <circle class="pl__ring" cx="44" cy="40" r="35" transform="rotate(90,44,40)" />
                </g>
              </g>
              <g fill="hsla(36,90%,50%,0)">
                <g class="pl__drop pl__drop--1">
                  <circle class="pl__drop-inner" cx="13" cy="60" r="2" />
                </g>
                <g class="pl__drop pl__drop--2">
                  <circle class="pl__drop-inner" cx="13" cy="60" r="2" />
                </g>
                <g class="pl__drop pl__drop--3">
                  <circle class="pl__drop-inner" cx="67" cy="72" r="2" />
                </g>
                <g class="pl__drop pl__drop--4">
                  <circle class="pl__drop-inner" cx="67" cy="72" r="2" />
                </g>
                <g class="pl__drop pl__drop--5">
                  <circle class="pl__drop-inner" cx="67" cy="72" r="2" />
                </g>
              </g>
              <g class="pl__pan">
                <rect
                  rx="2"
                  ry="2"
                  x="4"
                  y="66"
                  width="68"
                  height="14"
                  clip-path="url(#pan-clip-reset)"
                />
                <rect rx="2" ry="2" x="76" y="66" width="48" height="7" />
              </g>
              <rect
                class="pl__shadow"
                fill="hsla(36,90%,50%,0.18)"
                rx="3.5"
                ry="3.5"
                x="10"
                y="121"
                width="60"
                height="7"
              />
            </g>
          </svg>
        </div>

        <h1 class="auth-title">Nova <em>senha</em></h1>
        <p class="auth-subtitle">Escolhe uma senha forte para proteger a tua conta.</p>

        <form class="auth-form" id="reset-form" novalidate>
          <label class="auth-field">
            <span class="auth-field__label">Nova senha</span>
            <input
              type="password"
              name="password"
              id="password"
              autocomplete="new-password"
              required
              minlength="8"
              placeholder="Mínimo 8 caracteres"
            />
          </label>

          <label class="auth-field">
            <span class="auth-field__label">Confirmar senha</span>
            <input
              type="password"
              name="confirm"
              id="confirm"
              autocomplete="new-password"
              required
              minlength="8"
              placeholder="Repete a senha"
            />
          </label>

          <button type="submit" class="auth-submit" id="submit-btn">
            Guardar nova senha
            <span class="auth-submit__seal" aria-hidden="true"></span>
          </button>

          <p class="auth-feedback" id="feedback" role="status" hidden></p>
        </form>

        <p class="auth-foot">
          <a href="/auth/login" data-auth-link>Voltar ao login</a>
        </p>
      </div>
    </main>

    <script type="module" src="/src/auth/transitions.js"></script>
    <script type="module" src="/src/auth/reset-password.js"></script>
  </body>
</html>
