<!DOCTYPE html>
<html lang="pt">
<head>
  <link rel="icon" type="image/svg+xml" href="/frigideira.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Define uma nova senha do GastroAI.">
  <title>Nova senha — GastroAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="auth-body">

  <main class="auth-stage">
    <div class="auth-card">

      <div class="auth-brand">
        <svg class="auth-pan" viewBox="0 0 128 128" width="38" height="38" role="img" aria-label="GastroAI">
          <clipPath id="np-clip"><rect rx="12" ry="14" x="4" y="52" width="68" height="28"/></clipPath>
          <g fill="#ff9800">
            <g class="pl__pan">
              <rect rx="2" ry="2" x="4" y="66" width="68" height="14" clip-path="url(#np-clip)"/>
              <rect rx="2" ry="2" x="76" y="66" width="48" height="7"/>
            </g>
          </g>
        </svg>
        <span class="auth-brand__name">GastroAI</span>
      </div>

      <h1 class="auth-title">Definir nova senha</h1>
      <p class="auth-subtitle">Escolhe uma senha forte para a tua conta.</p>

      <form class="auth-form" id="reset-form" novalidate>
        <label class="auth-field">
          <span class="auth-field__label">Nova senha</span>
          <input type="password" name="password" id="password" autocomplete="new-password" required minlength="6" placeholder="Mínimo 6 caracteres">
        </label>

        <label class="auth-field">
          <span class="auth-field__label">Confirmar senha</span>
          <input type="password" name="confirm" id="confirm" autocomplete="new-password" required minlength="6" placeholder="Repete a senha">
        </label>

        <button type="submit" class="auth-submit" id="submit-btn">Guardar nova senha</button>

        <p class="auth-feedback" id="feedback" role="status" hidden></p>
      </form>

      <p class="auth-foot">
        <a href="/auth/login">Voltar ao login</a>
      </p>

    </div>
  </main>

  <script type="module" src="/src/auth/reset-password.js"></script>
</body>
</html>
