<!DOCTYPE html>
<html lang="pt">
<head>
    <link rel="icon" type="image/svg+xml" href="frigideira.svg">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GastroAI Chatbot - Assistente de inteligência artificial especializado em gastronomia.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <title>GastroAI Chatbot</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>if(sessionStorage.getItem('gastro-transition-meta'))document.documentElement.classList.add('page-entering');</script>
</head>
<body>
    <div id="food-container" aria-hidden="true"></div>

    <button id="back-button" class="back-button" aria-label="Voltar">
        <div class="back-button-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
                <path fill="none" d="M0 0h24v24H0z"/>
                <path d="M19 13H5.83l5.59 5.59L10 20l-8-8 8-8 1.41 1.41L5.83 11H19v2z"/>
            </svg>
        </div>
        <span class="back-button-text">Voltar</span>
    </button>

    <main id="chat-container">
        <div id="chat-header">
            <div class="chat-header-main">
                <span class="chat-kicker">GastroAI Atelier</span>
                <h1>Chef AI</h1>
            </div>
            <div class="chat-header-side">
                <span class="chat-status">Assistente online</span>
            </div>
        </div>

        <div class="chat-prompt-strip" aria-hidden="true">
            <span class="prompt-chip">Receitas</span>
            <span class="prompt-chip">Menus</span>
            <span class="prompt-chip">Técnicas</span>
            <span class="prompt-chip">Harmonização</span>
        </div>

        <div id="chat-messages"></div>

        <div class="chat-form-panel">
            <form id="chat-form">
                <div class="chat-form-main">
                    <label class="chat-input-shell" for="user-input">
                        <span class="chat-input-kicker">Nova pergunta</span>
                        <input
                            type="text"
                            id="user-input"
                            placeholder="Peça receitas, técnicas, menus ou harmonização..."
                            autocomplete="off"
                        >
                    </label>

                    <button
                        id="submit-button"
                        class="submit-button"
                        type="submit"
                        title="Enviar mensagem"
                        aria-label="Enviar mensagem"
                    >
                        <span class="button-icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </span>
                        <span class="button-label">Enviar</span>
                    </button>
                </div>

                <div class="chat-controls" role="toolbar" aria-label="Ações da conversa">
                    <button
                        type="button"
                        id="export-button"
                        class="control-button export-button"
                        title="Exportar conversa"
                        aria-label="Exportar conversa"
                    >
                        <span class="button-icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                        </span>
                        <span class="control-label">Exportar</span>
                    </button>

                    <button
                        id="clear-button"
                        class="control-button clear-button"
                        type="button"
                        disabled
                        title="Limpar mensagens"
                        aria-label="Limpar mensagens"
                    >
                        <span class="button-icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </span>
                        <span class="control-label">Limpar</span>
                    </button>

                    <button
                        id="stop-button"
                        class="control-button stop-button"
                        type="button"
                        disabled
                        title="Parar mensagem"
                        aria-label="Parar mensagem"
                    >
                        <span class="button-icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="7" y="7" width="10" height="10" rx="2"></rect>
                            </svg>
                        </span>
                        <span class="control-label">Parar</span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.18.0/matter.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.3/dist/purify.min.js" defer></script>
    <script type="module" src="script.js"></script>
</body>
</html>
