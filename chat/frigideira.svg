<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <clipPath id="pan-clip">
    <rect rx="12" ry="14" x="4" y="52" width="68" height="28" />
  </clipPath>
  <g>
    <!-- Anel da frigideira -->
    <g fill="none" stroke="#FF9800" stroke-dasharray="20 221" stroke-dashoffset="20" stroke-linecap="round" stroke-width="4">
      <circle cx="44" cy="40" r="35" transform="rotate(90,44,40)" />
    </g>
    <!-- Gotas internas (opcional, laranja claro) -->
    <g fill="#FFB74D">
      <circle cx="13" cy="60" r="2" />
      <circle cx="67" cy="72" r="2" />
    </g>
    <!-- Corpo da frigideira -->
    <g>
      <rect rx="2" ry="2" x="4" y="66" width="68" height="14" clip-path="url(#pan-clip)" fill="#FF9800" />
      <rect rx="2" ry="2" x="76" y="66" width="48" height="7" fill="#FF9800" />
    </g>
    <!-- Sombra preta -->
    <rect rx="3.5" ry="3.5" x="10" y="121" width="60" height="7" fill="#000000" opacity="0.2" />
  </g>
</svg>